name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

env:
  PYTHON_VERSION: "3.11"

jobs:
  # -------------------------------------------------------------------------
  # Job 1: Lint + Test
  # -------------------------------------------------------------------------
  test:
    name: Lint & Test
    runs-on: ubuntu-latest

    env:
      DATABASE_URL: sqlite+aiosqlite:///:memory:
      REDIS_URL: redis://localhost:6379/0
      MASTER_KEY: test-master-key
      OPENAI_API_KEY: sk-test
      ANTHROPIC_API_KEY: sk-ant-test
      GROQ_API_KEY: gsk-test
      DEFAULT_RPM: "60"
      DEFAULT_TPD: "100000"
      CACHE_TTL_SECONDS: "3600"

    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Lint with ruff
        run: ruff check app/ tests/

      - name: Run tests
        run: pytest tests/ -v --tb=short --asyncio-mode=auto

  # -------------------------------------------------------------------------
  # Job 2: Docker build + smoke test
  # -------------------------------------------------------------------------
  docker:
    name: Docker Build & Smoke Test
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t llm-gateway:ci .

      - name: Run container
        run: |
          docker run -d \
            --name gateway-ci \
            -p 8000:8000 \
            -e DATABASE_URL=sqlite+aiosqlite:///./gateway.db \
            -e REDIS_URL=redis://localhost:6379/0 \
            -e MASTER_KEY=ci-master-key \
            -e OPENAI_API_KEY=sk-test \
            -e ANTHROPIC_API_KEY=sk-ant-test \
            -e GROQ_API_KEY=gsk-test \
            llm-gateway:ci

      - name: Wait for gateway to start
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8000/health; then
              echo "Gateway is up!"
              exit 0
            fi
            echo "Waiting... ($i/30)"
            sleep 2
          done
          echo "Gateway failed to start"
          docker logs gateway-ci
          exit 1

      - name: Verify /health endpoint
        run: |
          response=$(curl -sf http://localhost:8000/health)
          echo "Response: $response"
          echo "$response" | python3 -c "import sys, json; d=json.load(sys.stdin); assert d['status']=='ok', f'Expected ok, got {d}'"

      - name: Verify /v1/models endpoint
        run: |
          curl -sf http://localhost:8000/v1/models | python3 -c "
          import sys, json
          d = json.load(sys.stdin)
          assert d['object'] == 'list', 'Expected list'
          assert len(d['data']) > 0, 'Expected at least one model'
          print(f'Found {len(d[\"data\"])} models.')
          "

      - name: Stop container
        if: always()
        run: docker stop gateway-ci || true
